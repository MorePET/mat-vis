---
# Auto-apply area: labels to PRs from .github/labeler.yml paths.
# Mirrors CODEOWNERS topology so the "is this client vs baker vs data"
# split is visible on every PR without manual triage.

name: PR labeler

on:  # yamllint disable-line rule:truthy
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
