name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # [materialx] extra intentionally excluded — only needed for
      # gpuopen layered graphs, tested separately in the baker container.
      - run: pip install -e '.[baker,dev]'
      - run: ruff check src/ tests/
      - run: pytest tests/ -v
