name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      # [materialx] extra intentionally excluded — only needed for
      # gpuopen layered graphs, tested separately in the baker container.
      - run: uv pip install --system -e '.[baker,dev]'
      - run: ruff check src/ tests/
      - run: pytest tests/ -v

  container:
    name: Container build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build baker image
        run: docker build -f Containerfile -t ghcr.io/morepet/mat-vis-baker:test .
      - name: Smoke test
        run: |
          docker run --rm ghcr.io/morepet/mat-vis-baker:test \
            python -c "import pyarrow; import materialx; print('ok')"
