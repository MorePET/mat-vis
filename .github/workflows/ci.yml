name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
    tags: ["v*"]

jobs:
  ci:
    name: Lint + Test + Container smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dagger shell-safety lint (#61)
        run: python3 scripts/check-dagger-shell-safety.py
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          module: .dagger
          args: test-all --src=.

  integration:
    name: Integration test (real upstream data)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          module: .dagger
          args: integration-test --src=.

  client-tests:
    name: Client tests (all languages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          module: .dagger
          args: test-clients --src=. --tag=v2026.04.0

  # validate-release lives in promote-data-release.yml (pre-promotion gate)
  # and release-validate.yml (daily drift check). It tests the state of a
  # published GitHub Release, not the code in this PR, so it does not
  # belong on the PR merge gate — see #80.

  push:
    name: Push baker image to GHCR
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ci, integration, client-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          module: .dagger
          args: >-
            push --src=.
            --tag=${{ github.ref_name }}
            --registry-user=${{ github.actor }}
            --registry-pass=env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
