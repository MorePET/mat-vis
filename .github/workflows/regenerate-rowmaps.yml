---
name: Regenerate rowmaps

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to regenerate rowmaps for'
        required: true
        default: 'v2026.04.0'
        type: string

permissions:
  contents: write
  issues: write          # needed by notify-on-failure composite action

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          module: .dagger
          args: >-
            regenerate-rowmaps
            --src=.
            --release-tag=${{ inputs.release-tag }}
            --registry-pass=env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          label-prefix: "[rowmap-regen-failed]"
          workflow-name: "regenerate-rowmaps"
          target: ${{ inputs.release-tag }}
          context: >-
            Likely causes: legacy rowmap scanner hit an unreadable
            parquet, gh upload failed, or the #82-class empty-parquet
            case silently emitted an empty map. Check run logs for the
            specific rowmap that failed.
