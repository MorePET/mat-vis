---
# Publish mat-vis-client to PyPI via trusted publisher (OIDC).
# Triggered on code release tags (semver).

name: Publish to PyPI

on:  # yamllint disable-line rule:truthy
  push:
    tags: ["client/v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish mat-vis-client to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build clients/python/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist/
