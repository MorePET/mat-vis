---
# Bake workflow — thin Dagger wrapper.

name: Bake

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to bake'
        required: true
        default: 'ambientcg'
        type: choice
        options:
          - ambientcg
          - polyhaven
          - gpuopen
          - physicallybased
      tier:
        description: 'Resolution tier'
        required: true
        default: '1k'
        type: choice
        options:
          - 1k
          - 2k
      batch-size:
        description: 'Materials per batch (default 100)'
        required: false
        default: '100'
        type: string
      release-tag:
        description: 'Calver data release tag (e.g. v2026.04.0)'
        required: false
        default: 'v2026.04.0'
        type: string

permissions:
  contents: write

jobs:
  bake:
    name: Bake ${{ inputs.source }} ${{ inputs.tier }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          module: .dagger
          args: >-
            bake-and-release
            --src=.
            --source=${{ inputs.source }}
            --tier=${{ inputs.tier }}
            --batch-size=${{ inputs.batch-size }}
            --release-tag=${{ inputs.release-tag }}
            --registry-pass=env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
