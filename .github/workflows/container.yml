name: Container

on:
  push:
    branches: [main]
    paths:
      - Containerfile
      - pyproject.toml
      - "src/**"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push baker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ghcr.io/morepet/mat-vis-baker:latest
