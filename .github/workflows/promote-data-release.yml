---
# Promote a data release from pre-release to latest.
#
# Flow:
#   1. Bake workflow uploads parquet+rowmap to a pre-release (downloadable, testable)
#   2. Data PRs (index+mtlx+thumbnails) reviewed and merged to dev
#   3. This workflow: validates assets exist, clears pre-release flag
#
# Trigger: manual dispatch after data PR review.

name: Promote data release

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Calver tag to promote (e.g. v2026.04.0)'
        required: true
        type: string
      dry-run:
        description: 'Dry run — validate only, do not promote'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write          # needed to open promotion-blocked issue on failure

jobs:
  promote:
    name: Promote ${{ inputs.release-tag }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release exists and is pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release-tag }}"
          RELEASE=$(gh release view "$TAG" --json tagName,isDraft,isPrerelease,assets --jq '.')

          IS_DRAFT=$(echo "$RELEASE" | jq -r '.isDraft')
          IS_PRE=$(echo "$RELEASE" | jq -r '.isPrerelease')
          ASSET_COUNT=$(echo "$RELEASE" | jq '.assets | length')

          echo "Tag: $TAG"
          echo "Draft: $IS_DRAFT"
          echo "Pre-release: $IS_PRE"
          echo "Assets: $ASSET_COUNT"

          if [ "$IS_DRAFT" = "true" ]; then
            echo "ERROR: Release is still a draft. Bake workflow should create pre-releases."
            exit 1
          fi

          if [ "$IS_PRE" != "true" ]; then
            echo "ERROR: Release is not a pre-release. Already promoted?"
            exit 1
          fi

          if [ "$ASSET_COUNT" -lt 2 ]; then
            echo "ERROR: Release has fewer than 2 assets. Bake may not have completed."
            exit 1
          fi

          echo "Assets:"
          echo "$RELEASE" | jq -r '.assets[].name'
          echo ""
          echo "✓ Release $TAG is a valid pre-release with $ASSET_COUNT assets"

      - name: Validate data PRs merged
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for open bake PRs — all should be merged before promote
          OPEN=$(gh pr list --search "data: bake" --state open --json number,title --jq '.[].title')
          if [ -n "$OPEN" ]; then
            echo "WARNING: Open data PRs found:"
            echo "$OPEN"
            echo ""
            echo "Consider merging these before promoting."
          else
            echo "✓ No open data PRs"
          fi

      - name: Validate release assets (gate)
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          module: .dagger
          args: >-
            validate-release --src=.
            --tag=${{ inputs.release-tag }}

      - name: Promote release
        if: inputs.dry-run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release-tag }}"
          gh release edit "$TAG" --prerelease=false
          echo "✓ Release $TAG promoted — no longer pre-release"
          echo ""
          echo "Release URL: https://github.com/MorePET/mat-vis/releases/tag/$TAG"

      - name: Open promotion-blocked issue on any step failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.release-tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        # Surfaces a promote-failure as a tracked issue. The prior mode
        # was silent-red in the Actions UI — v2026.04.0 shipped around
        # promote-data-release.yml entirely (tag existed 2 min before
        # the workflow did, see #79) and nobody noticed for a day. Same
        # dedupe pattern as release-validate.yml.
        run: |
          set -euo pipefail
          title="[promote-blocked] ${TAG}: promote-data-release failed"
          body="promote-data-release failed for **${TAG}**.

          - Run: ${RUN_URL}

          Likely causes: validate-release gate caught a manifest/parquet
          mismatch, a missing asset (see #79), or a missing mtlx bundle.
          The release is NOT promoted — pre-release flag still set.
          Do not manually flip the flag without fixing what failed;
          that's how v2026.04.0 shipped broken.

          This issue was opened automatically by
          .github/workflows/promote-data-release.yml after a run
          failed. It will not re-open if already present."

          existing=$(gh issue list \
            --repo "${{ github.repository }}" \
            --search "in:title \"[promote-blocked] ${TAG}\" is:open" \
            --json number --jq '.[0].number // empty')

          if [[ -n "${existing}" ]]; then
            gh issue comment "${existing}" \
              --repo "${{ github.repository }}" \
              --body "Promote failed again at $(date -u +%Y-%m-%dT%H:%MZ). Run: ${RUN_URL}"
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "${title}" \
              --body "${body}" \
              --label "bug,area:data,priority:high"
          fi
