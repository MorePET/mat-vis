---
name: Rebuild manifest

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag'
        required: true
        default: 'v2026.04.0'
        type: string

permissions:
  contents: write
  issues: write          # needed by notify-on-failure composite action

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          module: .dagger
          args: >-
            rebuild-manifest
            --src=.
            --release-tag=${{ inputs.release-tag }}
            --registry-pass=env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          label-prefix: "[rebuild-manifest-failed]"
          workflow-name: "rebuild-manifest"
          target: ${{ inputs.release-tag }}
          context: >-
            Likely causes: release not found, gh API rate-limit, upload
            of new manifest failed. The manifest on the release may now
            be stale relative to actual assets — run validate-release
            next to see whether the state is actually drifted.
